<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <link rel="icon" href="logo.png">
    <link rel="manifest" href="manifest.json">
    <link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حصن المسلم - اليقين</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@500;700;900&display=swap');

        body {
            font-family: 'Tajawal', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364);
            background-size: 400% 400%;
            animation: bgMove 15s ease infinite;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #fff;
            overflow-x: hidden;
        }

        @keyframes bgMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* شريط العنوان العلوي */
        .page-header {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
            position: sticky;
            top: 0;
            background: rgba(15, 32, 39, 0.9);
            backdrop-filter: blur(10px);
            z-index: 100;
            border-bottom: 2px solid #FFD700;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .back-btn {
            position: absolute;
            right: 20px;
            background: rgba(255, 215, 0, 0.2);
            border: 1px solid #FFD700;
            color: #FFD700;
            width: 40px; height: 40px;
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .back-btn:hover {
            background: #FFD700;
            color: #000;
            transform: translateX(-5px);
        }

        .page-title {
            margin: 0;
            font-size: 1.5rem;
            color: #FFD700;
            font-weight: 900;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* حاوية الأذكار */
        .hisn-container {
            width: 100%;
            max-width: 500px;
            padding: 20px 15px 50px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* بطاقة الذكر (Accordion) */
        .hisn-card {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }

        .hisn-card.active {
            border-color: #FFD700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
        }

        /* رأس البطاقة (الزر القابل للنقر) بخلفية متدرجة متحركة */
        .hisn-header {
            padding: 18px 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.01));
            transition: background 0.3s ease;
            user-select: none;
        }

        .hisn-card.active .hisn-header {
            background: linear-gradient(135deg, #1f4037, #99f2c8);
            background-size: 200% 200%;
            animation: gradientBtn 3s ease infinite;
        }

        @keyframes gradientBtn {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .hisn-title-wrap {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .hisn-icon {
            font-size: 1.5rem;
            background: rgba(255, 215, 0, 0.2);
            width: 45px; height: 45px;
            display: flex; justify-content: center; align-items: center;
            border-radius: 12px;
            border: 1px solid rgba(255, 215, 0, 0.4);
        }

        .hisn-title {
            font-size: 1.1rem;
            font-weight: bold;
            color: #fff;
        }
        
        .hisn-card.active .hisn-title {
            color: #000; 
        }

        .arrow-icon {
            font-size: 1.2rem;
            transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            color: #FFD700;
        }

        .hisn-card.active .arrow-icon {
            transform: rotate(180deg);
            color: #000;
        }

        /* المحتوى المنسدل (البوابة الانسيابية) */
        .hisn-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            background: rgba(0, 0, 0, 0.6);
        }

        .hisn-text {
            padding: 20px;
            font-size: 1.2rem;
            line-height: 1.9;
            color: #e0e0e0;
            text-align: justify;
            border-top: 1px solid rgba(255, 215, 0, 0.2);
        }

        .hisn-source {
            display: block;
            margin-top: 15px;
            font-size: 0.85rem;
            color: #aaa;
            text-align: left;
            font-style: italic;
        }

    </style>
</head>

    <script>
        // مصفوفة حصن المسلم الشاملة
        const hisnData = [
            { title: "الاستيقاظ من النوم", icon: "🥱", text: "الحَمْدُ للهِ الَّذِي أَحْيَانَا بَعْدَ مَا أَمَاتَنَا، وَإِلَيْهِ النُّشُورُ.", source: "رواه البخاري" },
            { title: "دعاء لبس الثوب", icon: "👕", text: "الحَمْدُ للهِ الَّذِي كَسَانِي هَذَا الثَّوْبَ وَرَزَقَنِيهِ مِنْ غَيْرِ حَوْلٍ مِنِّي وَلَا قُوَّةٍ.", source: "أخرجه أهل السنن" },
            { title: "دعاء لبس الثوب الجديد", icon: "✨", text: "اللَّهُمَّ لَكَ الحَمْدُ أَنْتَ كَسَوْتَنِيهِ، أَسْأَلُكَ مِنْ خَيْرِهِ وَخَيْرِ مَا صُنِعَ لَهُ، وَأَعُوذُ بِكَ مِنْ شَرِّهِ وَشَرِّ مَا صُنِعَ لَهُ.", source: "رواه أبو داود والترمذي" },
            { title: "ما يقول إذا وضع ثوبه", icon: "🎽", text: "بِسْمِ اللهِ.", source: "رواه الترمذي" },
            { title: "الدخول إلى الخلاء", icon: "🚪", text: "بِسْمِ اللهِ، اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنَ الخُبُثِ وَالخَبَائِثِ.", source: "رواه البخاري ومسلم" },
            { title: "الخروج من الخلاء", icon: "🚶", text: "غُفْرَانَكَ.", source: "أخرجه أهل السنن" },
            { title: "الذكر قبل الوضوء", icon: "💧", text: "بِسْمِ اللهِ.", source: "رواه أبو داود" },
            { title: "الذكر بعد الوضوء", icon: "🌟", text: "أَشْهَدُ أَنْ لَا إِلَهَ إِلَّا اللهُ وَحْدَهُ لَا شَرِيكَ لَهُ، وَأَشْهَدُ أَنَّ مُحَمَّدًا عَبْدُهُ وَرَسُولُهُ.<br><br>اللَّهُمَّ اجْعَلْنِي مِنَ التَّوَّابِينَ وَاجْعَلْنِي مِنَ المُتَطَهِّرِينَ.", source: "رواه مسلم والترمذي" },
            { title: "الخروج من المنزل", icon: "🏡", text: "بِسْمِ اللهِ، تَوَكَّلْتُ عَلَى اللهِ، وَلَا حَوْلَ وَلَا قُوَّةَ إِلَّا بِاللهِ.", source: "رواه أبو داود والترمذي" },
            { title: "الدخول إلى المنزل", icon: "🔑", text: "بِسْمِ اللهِ وَلَجْنَا، وَبِسْمِ اللهِ خَرَجْنَا، وَعَلَى رَبِّنَا تَوَكَّلْنَا، ثُمَّ لِيُسَلِّمْ عَلَى أَهْلِهِ.", source: "رواه أبو داود" },
            { title: "الذهاب إلى المسجد", icon: "🚶‍♂️", text: "اللَّهُمَّ اجْعَلْ فِي قَلْبِي نُورًا، وَفِي لِسَانِي نُورًا، وَاجْعَلْ فِي سَمْعِي نُورًا، وَاجْعَلْ فِي بَصَرِي نُورًا، وَاجْعَلْ مِنْ خَلْفِي نُورًا، وَمِنْ أَمَامِي نُورًا، وَاجْعَلْ مِنْ فَوْقِي نُورًا، وَمِنْ تَحْتِي نُورًا، اللَّهُمَّ أَعْطِنِي نُورًا.", source: "رواه البخاري ومسلم" },
            { title: "دخول المسجد", icon: "🕌", text: "أَعُوذُ بِاللهِ العَظِيمِ، وَبِوَجْهِهِ الكَرِيمِ، وَسُلْطَانِهِ القَدِيمِ، مِنَ الشَّيْطَانِ الرَّجِيمِ.<br>بِسْمِ اللهِ، وَالصَّلَاةُ وَالسَّلَامُ عَلَى رَسُولِ اللهِ.<br>اللَّهُمَّ افْتَحْ لِي أَبْوَابَ رَحْمَتِكَ.", source: "رواه مسلم وأبو داود" },
            { title: "الخروج من المسجد", icon: "🕌", text: "بِسْمِ اللهِ وَالصَّلَاةُ وَالسَّلَامُ عَلَى رَسُولِ اللهِ، اللَّهُمَّ إِنِّي أَسْأَلُكَ مِنْ فَضْلِكَ، اللَّهُمَّ اعْصِمْنِي مِنَ الشَّيْطَانِ الرَّجِيمِ.", source: "رواه مسلم وابن ماجه" },
            { title: "أذكار الأذان", icon: "📢", text: "يقول مثل ما يقول المؤذن إلا في (حي على الصلاة وحي على الفلاح) فيقول: لَا حَوْلَ وَلَا قُوَّةَ إِلَّا بِاللهِ.<br><br>ثم يقول بعد الأذان: اللَّهُمَّ رَبَّ هَذِهِ الدَّعْوَةِ التَّامَّةِ، وَالصَّلَاةِ القَائِمَةِ، آتِ مُحَمَّدًا الوَسِيلَةَ وَالفَضِيلَةَ، وَابْعَثْهُ مَقَامًا مَحْمُودًا الَّذِي وَعَدْتَهُ.", source: "رواه البخاري" },
            { title: "دعاء الاستفتاح في الصلاة", icon: "🤲", text: "سُبْحَانَكَ اللَّهُمَّ وَبِحَمْدِكَ، وَتَبَارَكَ اسْمُكَ، وَتَعَالَى جَدُّكَ، وَلَا إِلَهَ غَيْرُكَ.", source: "أخرجه الأربعة" },
            { title: "دعاء الركوع", icon: "🙇", text: "سُبْحَانَ رَبِّيَ العَظِيمِ (ثلاث مرات).<br>سُبْحَانَكَ اللَّهُمَّ رَبَّنَا وَبِحَمْدِكَ اللَّهُمَّ اغْفِرْ لِي.", source: "رواه البخاري ومسلم" },
            { title: "الرفع من الركوع", icon: "🧍", text: "سَمِعَ اللهُ لِمَنْ حَمِدَهُ.<br>رَبَّنَا وَلَكَ الحَمْدُ، حَمْدًا كَثِيرًا طَيِّبًا مُبَارَكًا فِيهِ.", source: "رواه البخاري" },
            { title: "دعاء السجود", icon: "🙇‍♂️", text: "سُبْحَانَ رَبِّيَ الأَعْلَى (ثلاث مرات).<br>سُبْحَانَكَ اللَّهُمَّ رَبَّنَا وَبِحَمْدِكَ اللَّهُمَّ اغْفِرْ لِي.", source: "رواه البخاري ومسلم" },
            { title: "الجلسة بين السجدتين", icon: "🧎", text: "رَبِّ اغْفِرْ لِي، رَبِّ اغْفِرْ لِي.<br>اللَّهُمَّ اغْفِرْ لِي، وَارْحَمْنِي، وَاهْدِنِي، وَاجْبُرْنِي، وَعَافِنِي، وَارْزُقْنِي.", source: "أخرجه أصحاب السنن" },
            { title: "سجود التلاوة", icon: "📖", text: "سَجَدَ وَجْهِيَ لِلَّذِي خَلَقَهُ، وَشَقَّ سَمْعَهُ وَبَصَرَهُ، بِحَوْلِهِ وَقُوَّتِهِ، فَتَبَارَكَ اللهُ أَحْسَنُ الخَالِقِينَ.", source: "رواه الترمذي" },
            { title: "التشهد", icon: "☝️", text: "التَّحِيَّاتُ للهِ، وَالصَّلَوَاتُ وَالطَّيِّبَاتُ، السَّلَامُ عَلَيْكَ أَيُّهَا النَّبِيُّ وَرَحْمَةُ اللهِ وَبَرَكَاتُهُ، السَّلَامُ عَلَيْنَا وَعَلَى عِبَادِ اللهِ الصَّالِحِينَ. أَشْهَدُ أَنْ لَا إِلَهَ إِلَّا اللهُ، وَأَشْهَدُ أَنَّ مُحَمَّدًا عَبْدُهُ وَرَسُولُهُ.", source: "رواه البخاري ومسلم" },
            { title: "الدعاء بعد التشهد الأخير", icon: "🤲", text: "اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنْ عَذَابِ القَبْرِ، وَمِنْ عَذَابِ جَهَنَّمَ، وَمِنْ فِتْنَةِ المَحْيَا وَالمَمَاتِ، وَمِنْ شَرِّ فِتْنَةِ المَسِيحِ الدَّجَّالِ.", source: "رواه البخاري ومسلم" },
            { title: "الأذكار بعد السلام من الصلاة", icon: "🕋", text: "أَسْتَغْفِرُ اللهَ (ثلاثاً).<br>اللَّهُمَّ أَنْتَ السَّلَامُ، وَمِنْكَ السَّلَامُ، تَبَارَكْتَ يَا ذَا الجَلَالِ وَالإِكْرَامِ.<br>لَا إِلَهَ إِلَّا اللهُ وَحْدَهُ لَا شَرِيكَ لَهُ، لَهُ المُلكُ وَلَهُ الحَمْدُ وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ. اللَّهُمَّ لَا مَانِعَ لِمَا أَعْطَيْتَ، وَلَا مُعْطِيَ لِمَا مَنَعْتَ، وَلَا يَنْفَعُ ذَا الجَدِّ مِنْكَ الجَدُّ.", source: "رواه البخاري ومسلم" },
            { title: "دعاء صلاة الاستخارة", icon: "🧭", text: "اللَّهُمَّ إِنِّي أَسْتَخِيرُكَ بِعِلْمِكَ، وَأَسْتَقْدِرُكَ بِقُدْرَتِكَ، وَأَسْأَلُكَ مِنْ فَضْلِكَ العَظِيمِ، فَإِنَّكَ تَقْدِرُ وَلَا أَقْدِرُ، وَتَعْلَمُ وَلَا أَعْلَمُ، وَأَنْتَ عَلَّامُ الغُيُوبِ... (ثم يسمي حاجته).", source: "رواه البخاري" },
            { title: "أذكار النوم", icon: "🛌", text: "يجمع كفيه ثم ينفث فيهما فيقرأ: قل هو الله أحد، وقل أعوذ برب الفلق، وقل أعوذ برب الناس (ثم يمسح بهما ما استطاع من جسده - 3 مرات).<br><br>بِاسْمِكَ رَبِّي وَضَعْتُ جَنْبِي، وَبِكَ أَرْفَعُهُ، فَإِنْ أَمْسَكْتَ نَفْسِي فَارْحَمْهَا، وَإِنْ أَرْسَلْتَهَا فَاحْفَظْهَا، بِمَا تَحْفَظُ بِهِ عِبَادَكَ الصَّالِحِينَ.", source: "رواه البخاري ومسلم" },
            { title: "الفزع في النوم والوحشة", icon: "😨", text: "أَعُوذُ بِكَلِمَاتِ اللهِ التَّامَّاتِ مِنْ غَضَبِهِ وَعِقَابِهِ، وَشَرِّ عِبَادِهِ، وَمِنْ هَمَزَاتِ الشَّيَاطِينِ وَأَنْ يَحْضُرُونِ.", source: "رواه أبو داود والترمذي" },
            { title: "ما يفعل من رأى الرؤيا", icon: "💭", text: "ينفث عن يساره (ثلاثاً).<br>يستعيذ بالله من الشيطان ومن شر ما رأى (ثلاثاً).<br>لا يحدث بها أحداً.<br>يتحول عن جنبه الذي كان عليه.", source: "رواه مسلم" },
            { title: "الهم والحزن", icon: "😔", text: "اللَّهُمَّ إِنِّي عَبْدُكَ، ابْنُ عَبْدِكَ، ابْنُ أَمَتِكَ، نَاصِيَتِي بِيَدِكَ، مَاضٍ فِيَّ حُكْمُكَ، عَدْلٌ فِيَّ قَضَاؤُكَ، أَسْأَلُكَ بِكُلِّ اسْمٍ هُوَ لَكَ سَمَّيْتَ بِهِ نَفْسَكَ، أَوْ أَنْزَلْتَهُ فِي كِتَابِكَ، أَوْ عَلَّمْتَهُ أَحَدًا مِنْ خَلْقِكَ، أَوْ اسْتَأْثَرْتَ بِهِ فِي عِلْمِ الغَيْبِ عِنْدَكَ، أَنْ تَجْعَلَ القُرْآنَ رَبِيعَ قَلْبِي، وَنُورَ صَدْرِي، وَجَلَاءَ حُزْنِي، وَذَهَابَ هَمِّي.", source: "رواه أحمد" },

            { title: "قبل الطعام", icon: "🍽️", text: "إِذَا أَكَلَ أَحَدُكُمْ طَعَامًا فَلْيَقُلْ: بِسْمِ اللهِ، فَإِنْ نَسِيَ فِي أَوَّلِهِ فَلْيَقُلْ: بِسْمِ اللهِ فِي أَوَّلِهِ وَآخِرِهِ.", source: "رواه أبو داود والترمذي" },

            { title: "دعاء العطاس", icon: "🤧", text: "إذا عطس فليقل: الحَمْدُ للهِ. وليقل له أخوه: يَرْحَمُكَ اللهُ. فإذا قال له يرحمك الله، فليقل: يَهْدِيكُمُ اللهُ وَيُصْلِحُ بَالَكُمْ.", source: "رواه البخاري" },

            { title: "دعاء ركوب الدابة (السيارة)", icon: "🚗", text: "بِسْمِ اللهِ، الحَمْدُ للهِ، ﴿سُبْحَانَ الَّذِي سَخَّرَ لَنَا هَذَا وَمَا كُنَّا لَهُ مُقْرِنِينَ * وَإِنَّا إِلَى رَبِّنَا لَمُنْقَلِبُونَ﴾، الحَمْدُ للهِ، الحَمْدُ للهِ، الحَمْدُ للهِ، اللهُ أَكْبَرُ، اللهُ أَكْبَرُ، اللهُ أَكْبَرُ...", source: "رواه أبو داود والترمذي" },
            { title: "دعاء السفر", icon: "✈️", text: "اللهُ أَكْبَرُ، اللهُ أَكْبَرُ، اللهُ أَكْبَرُ، ﴿سُبْحَانَ الَّذِي سَخَّرَ لَنَا هَذَا وَمَا كُنَّا لَهُ مُقْرِنِينَ...﴾ اللَّهُمَّ إِنَّا نَسْأَلُكَ فِي سَفَرِنَا هَذَا البِرَّ وَالتَّقْوَى، وَمِنَ العَمَلِ مَا تَرْضَى...", source: "رواه مسلم" },
            { title: "الدخول إلى السوق", icon: "🛒", text: "لَا إِلَهَ إِلَّا اللهُ وَحْدَهُ لَا شَرِيكَ لَهُ، لَهُ المُلْكُ وَلَهُ الحَمْدُ، يُحْيِي وَيُمِيتُ، وَهُوَ حَيٌّ لَا يَمُوتُ، بِيَدِهِ الخَيْرُ، وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ.", source: "رواه الترمذي وابن ماجه" },
            { title: "كفارة المجلس", icon: "👥", text: "سُبْحَانَكَ اللَّهُمَّ وَبِحَمْدِكَ، أَشْهَدُ أَنْ لَا إِلَهَ إِلَّا أَنْتَ، أَسْتَغْفِرُكَ وَأَتُوبُ إِلَيْكَ.", source: "أخرجه أصحاب السنن" }
        ];

        const container = document.getElementById('hisn-list');

        // توليد البطاقات
        hisnData.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'hisn-card';
            
            card.innerHTML = `
                <div class="hisn-header">
                    <div class="hisn-title-wrap">
                        <span class="hisn-icon">${item.icon}</span>
                        <span class="hisn-title">${item.title}</span>
                    </div>
                    <span class="arrow-icon">▼</span>
                </div>
                <div class="hisn-content">
                    <div class="hisn-text">
                        ${item.text}
                        <span class="hisn-source">${item.source}</span>
                    </div>
                </div>
            `;

            container.appendChild(card);

            // برمجة حركة الفتح والإغلاق الانسيابية
            const header = card.querySelector('.hisn-header');
            const content = card.querySelector('.hisn-content');

            header.addEventListener('click', () => {
                // إغلاق البطاقات الأخرى عند فتح بطاقة جديدة (لتجنب الزحام)
                const allCards = document.querySelectorAll('.hisn-card');
                allCards.forEach(c => {
                    if (c !== card) {
                        c.classList.remove('active');
                        c.querySelector('.hisn-content').style.maxHeight = null;
                    }
                });

                // تفعيل أو إلغاء تفعيل البطاقة الحالية
                card.classList.toggle('active');
                if (card.classList.contains('active')) {
                    content.style.maxHeight = content.scrollHeight + "px";
                } else {
                    content.style.maxHeight = null;
                }
            });
        });
    </script>
