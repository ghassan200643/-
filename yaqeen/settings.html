<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <link rel="icon" href="logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الإعدادات - اليقين</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* 🌟 التنسيقات الأساسية */
        body { overflow-y: auto !important; padding-bottom: 40px; transition: font-size 0.3s; }
        
        .settings-container { max-width: 500px; margin: 0 auto; padding: 20px; z-index: 100; position: relative;}
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,215,0,0.3); padding-bottom: 15px; margin-bottom: 20px;}
        .back-btn { background: rgba(255,215,0,0.15); border: 1px solid #FFD700; color: #FFD700; width: 45px; height: 45px; border-radius: 14px; display: flex; justify-content: center; align-items: center; font-size: 1.2rem; cursor: pointer; text-decoration: none; transition: 0.3s; }
        .back-btn:hover { background: #FFD700; color: #000; }
        .page-title { color: #FFD700; font-size: 1.5rem; font-weight: 900; margin: 0;}
        
        /* تصميم الكروت المرتبة */
        .setting-card { background: rgba(10, 20, 30, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; padding: 25px 20px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .setting-title { font-size: 1.2rem; color: #FFD700; margin-bottom: 18px; font-weight: 900; display: flex; align-items: center; gap: 8px; }
        
        /* 1. أشكال الواجهة */
        .ui-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .ui-btn { padding: 14px 8px; border-radius: 16px; border: 2px solid rgba(255,255,255,0.1); cursor: pointer; color: #ddd; font-weight: bold; font-family: 'Tajawal'; font-size: 0.95rem; transition: 0.3s; text-align: center; background: rgba(0,0,0,0.4); }
        .ui-btn:hover { border-color: rgba(255,255,255,0.4); color: #fff; }
        .ui-btn.active { border-color: #00e5ff; background: rgba(0, 229, 255, 0.15); color: #00e5ff; transform: scale(1.05); box-shadow: 0 0 15px rgba(0,229,255,0.3); }

        /* 2. تكبير الخط والأيقونات (القسم الجديد) */
        .font-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .font-btn { padding: 12px 5px; border-radius: 12px; border: 2px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.4); color: white; cursor: pointer; font-family: 'Tajawal'; font-weight: bold; transition: 0.3s; text-align: center; }
        .font-btn.active { border-color: #FFD700; background: rgba(255,215,0,0.15); color: #FFD700; transform: scale(1.05); }

        /* 3. الألوان الثابتة */
        .color-options { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
        .color-btn { width: 45px; height: 45px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .color-btn:hover { transform: translateY(-3px); }
        .color-btn.active { border-color: #FFD700; transform: scale(1.2); box-shadow: 0 0 15px rgba(255,215,0,0.5); }

        /* 4. الخلفيات المتحركة */
        .themes-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .theme-btn { padding: 15px 10px; border-radius: 18px; border: 2px solid transparent; cursor: pointer; color: #fff; font-weight: bold; font-family: 'Tajawal'; font-size: 1rem; transition: 0.3s; display: flex; flex-direction: column; align-items: center; gap: 8px; text-align: center; box-shadow: inset 0 0 20px rgba(0,0,0,0.5); }
        .theme-btn span { font-size: 1.8rem; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5)); }
        .theme-btn:hover { filter: brightness(1.1); }
        .theme-btn.active { border-color: #FFD700; transform: scale(1.05); box-shadow: 0 0 20px rgba(255,215,0,0.4), inset 0 0 10px rgba(0,0,0,0.3); }

        /* 5. قسم الأصوات والمفاتيح */
        .toggle-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .toggle-row:last-child { border: none; margin: 0; padding: 0; }
        .test-audio-btn { background: rgba(0, 229, 255, 0.1); border: 1px solid #00e5ff; color: #00e5ff; padding: 8px 16px; border-radius: 12px; cursor: pointer; font-family: 'Tajawal'; font-weight: bold; transition: 0.3s; margin-top: 8px; display: inline-flex; align-items: center; gap: 5px; font-size: 0.9rem;}
        .test-audio-btn:hover { background: rgba(0, 229, 255, 0.2); }
        .test-audio-btn:active { background: #00e5ff; color: #000; }
        
        .switch { position: relative; display: inline-block; width: 54px; height: 28px; flex-shrink: 0;}
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(255,255,255,0.2); border-radius: 34px; transition: .4s; }
        .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 4px; bottom: 4px; background-color: white; border-radius: 50%; transition: .4s; box-shadow: 0 2px 5px rgba(0,0,0,0.3);}
        input:checked + .slider { background-color: #FFD700; }
        input:checked + .slider:before { transform: translateX(26px); background-color: #000; }
    </style>
</head>
<body>

<audio id="audio-click" src="./audio/click.mp3" preload="auto"></audio>
<audio id="audio-alert5" src="./audio/adhan.mp3" preload="auto"></audio>
<audio id="audio-adhan" src="./audio/adhan.mp3" preload="auto"></audio>

<div class="settings-container">
    <div class="header">
        <h1 class="page-title">⚙️ الإعدادات</h1>
        <a href="index.html" class="back-btn">❯</a>
    </div>

    <div class="setting-card">
        <div class="setting-title">🔎 حجم الخط والأيقونات</div>
        <div class="font-grid">
            <button class="font-btn" data-size="14px">صغير ➖</button>
            <button class="font-btn" data-size="16px">متوسط 🟰</button>
            <button class="font-btn" data-size="18px">كبير ➕</button>
        </div>
    </div>

    <div class="setting-card">
        <div class="setting-title">🖋️ لون النص (الخط)</div>
        <div class="font-grid">
            <button class="text-color-btn" data-color="text-white" style="color: white; background: rgba(0,0,0,0.5);">أبيض ⚪</button>
            <button class="text-color-btn" data-color="text-black" style="color: black; background: #f0f0f0;">أسود ⚫</button>
            <button class="text-color-btn" data-color="text-gold" style="color: #FFD700; background: rgba(0,0,0,0.5);">ذهبي 🟡</button>
            <button class="text-color-btn" data-color="text-cyan" style="color: #00e5ff; background: rgba(0,0,0,0.5);">سماوي 🔵</button>
        </div>
    </div>

    <div class="setting-title">📐 شكل الأيقونات والواجهة</div>
<div class="ui-grid">
    <button class="ui-btn" data-ui="default">بدون تغيير (طبيعي)</button>
    <button class="ui-btn" data-ui="islamic" style="border-radius: 15px 0 15px 0;">إسلامي بنقوش</button>
    <button class="ui-btn" data-ui="neon" style="text-shadow: 0 0 5px #00e5ff;">حديث وضوئي</button>
    <button class="ui-btn" data-ui="snow" style="border-radius: 30px;">ثلجي ناعم</button>
    <button class="ui-btn" data-ui="stone" style="border-radius: 4px; border-width: 3px;">حجري صلب</button>
    <button class="ui-btn" data-ui="old" style="border-style: dashed;">قديم وتاريخي</button> 
</div>
    
    <div class="setting-card">
        <div class="setting-title">🎨 الألوان الكلاسيكية (ثابتة)</div>
        <div class="color-options">
            <div class="color-btn bg-btn" data-bg="default" style="background: linear-gradient(135deg,#0f2027,#203a43);"></div>
            <div class="color-btn bg-btn" data-bg="sunset" style="background: linear-gradient(135deg,#833ab4,#fd1d1d);"></div>
            <div class="color-btn bg-btn" data-bg="forest" style="background: linear-gradient(135deg,#134e5e,#71b280);"></div>
            <div class="color-btn bg-btn" data-bg="ocean" style="background: linear-gradient(135deg,#005c97,#363795);"></div>
            <div class="color-btn bg-btn" data-bg="desert" style="background: linear-gradient(135deg,#b9935a,#e7c089);"></div>
            <div class="color-btn bg-btn" data-bg="night" style="background: linear-gradient(135deg,#0f0c29,#302b63);"></div>
        </div>
    </div>

    <div class="setting-card">
        <div class="setting-title">🌟 الخلفيات المتحركة</div>
        <div class="themes-grid">
            <button class="theme-btn bg-btn" data-bg="theme-botanical" style="background: linear-gradient(135deg, #134e5e, #71b280);"><span>🌿</span> نباتي حيوي</button>
            <button class="theme-btn bg-btn" data-bg="theme-stone" style="background: repeating-radial-gradient(circle at center, #3a3a3a, #2c2c2c 10px, #1a1a1a 30px, #0f0f0f 100px);"><span>🧱</span> جداري قديم</button>
            <button class="theme-btn bg-btn" data-bg="theme-cyber" style="background: #050a0f; border-bottom: 3px solid #00e5ff;"><span>💻</span> تقني سايبر</button>
            <button class="theme-btn bg-btn" data-bg="theme-islamic" style="background: linear-gradient(135deg, #1c3d5a, #0f2027);"><span>🕌</span> ديني فخم</button>
            <button class="theme-btn bg-btn" data-bg="theme-m" style="background: linear-gradient(135deg, #0f2027, #2c5364);"><span>Ⓜ️</span> خلفية حرف M</button>
            <button class="theme-btn bg-btn" data-bg="theme-pink" style="background: linear-gradient(135deg, #ff9a9e, #fecfef); color: #000;"><span>🌸</span> زهري بناتي</button>
            <button class="theme-btn bg-btn" data-bg="theme-lightgreen" style="background: linear-gradient(135deg, #a8ff78, #78ffd6); color: #000;"><span>🍃</span> أخضر شبابي</button>
        </div>
    </div>

    <div class="setting-card">
        <div class="setting-title">🔔 التنبيهات وتجربة الأصوات</div>
        
        <div class="toggle-row">
            <div>
                <div style="font-weight: bold; font-size: 1.1rem;">تنبيه الوضوء (قبل 5 دقائق)</div>
                <button class="test-audio-btn" onclick="document.getElementById('audio-alert5').play()">▶ تجربة الرنة</button>
            </div>
            <label class="switch"><input type="checkbox" id="alert5-toggle"><span class="slider"></span></label>
        </div>
        
        <div class="toggle-row">
            <div>
                <div style="font-weight: bold; font-size: 1.1rem;">أذان الصلاة (الله أكبر)</div>
                <button class="test-audio-btn" onclick="document.getElementById('audio-adhan').play()">▶ تجربة الأذان</button>
            </div>
            <label class="switch"><input type="checkbox" id="adhan-toggle"><span class="slider"></span></label>
        </div>

        <div class="toggle-row">
            <div>
                <div style="font-weight: bold; font-size: 1.1rem;">صوت النقرات (Click)</div>
                <button class="test-audio-btn" onclick="document.getElementById('audio-click').play()">▶ تجربة صوت النقر</button>
            </div>
            <label class="switch"><input type="checkbox" id="sound-toggle"><span class="slider"></span></label>
        </div>
    </div>
</div>

<script src="app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
    
    // --- 1. برمجة حجم الخط والأيقونات ---
    const savedFontSize = localStorage.getItem('yaqeen_font') || '16px';
    document.documentElement.style.fontSize = savedFontSize; // تطبيق الحجم على كامل الصفحة
    

    // --- 5. برمجة لون النص ---
    const savedTextColor = localStorage.getItem('yaqeen_textcolor') || 'text-white';
    const textColorBtns = document.querySelectorAll('.text-color-btn');
    
    textColorBtns.forEach(btn => {
        if(btn.dataset.color === savedTextColor) btn.classList.add('active');
        btn.addEventListener('click', function() {
            textColorBtns.forEach(b => b.classList.remove('active')); 
            this.classList.add('active');
            localStorage.setItem('yaqeen_textcolor', this.dataset.color); 
            if(typeof applyTheme === 'function') applyTheme(); // تحديث اللون فوراً
        });
    });

    const fontBtns = document.querySelectorAll('.font-btn');
    fontBtns.forEach(btn => {
        if(btn.dataset.size === savedFontSize) btn.classList.add('active');
        
        btn.addEventListener('click', function() {
            fontBtns.forEach(b => b.classList.remove('active')); 
            this.classList.add('active');
            localStorage.setItem('yaqeen_font', this.dataset.size); 
            document.documentElement.style.fontSize = this.dataset.size; // التكبير الفوري
            if(localStorage.getItem('yaqeen_sound') !== 'false') document.getElementById('audio-click')?.play().catch(()=>{});
        });
    });

    // --- 2. برمجة الخلفيات ---
    const savedBg = localStorage.getItem('yaqeen_bg') || 'default';
    const bgBtns = document.querySelectorAll('.bg-btn');
    bgBtns.forEach(btn => {
        if(btn.dataset.bg === savedBg) btn.classList.add('active');
        btn.addEventListener('click', function() {
            bgBtns.forEach(b => b.classList.remove('active')); 
            this.classList.add('active');
            localStorage.setItem('yaqeen_bg', this.dataset.bg); 
            if(typeof applyTheme === 'function') applyTheme(); // استدعاء دالة التغيير
            if(localStorage.getItem('yaqeen_sound') !== 'false') document.getElementById('audio-click')?.play().catch(()=>{});
        });
    });

    // --- 3. برمجة شكل الواجهة ---
    const savedUI = localStorage.getItem('yaqeen_ui') || 'default';
    const uiBtns = document.querySelectorAll('.ui-btn');
    uiBtns.forEach(btn => {
        if(btn.dataset.ui === savedUI) btn.classList.add('active');
        btn.addEventListener('click', function() {
            uiBtns.forEach(b => b.classList.remove('active')); 
            this.classList.add('active');
            localStorage.setItem('yaqeen_ui', this.dataset.ui); 
            if(typeof applyTheme === 'function') applyTheme();
            if(localStorage.getItem('yaqeen_sound') !== 'false') document.getElementById('audio-click')?.play().catch(()=>{});
        });
    });

    // --- 4. برمجة أزرار الصوت (المفاتيح الجميلة الخاصة بك) ---
    const toggles = ['alert5', 'adhan', 'sound'];
    toggles.forEach(id => {
        const el = document.getElementById(id + '-toggle');
        if(el) {
            // قراءة الذاكرة (افتراضياً المفتاح مفعل)
            el.checked = localStorage.getItem('yaqeen_' + id) !== 'false';
            
            // عند تشغيل أو إطفاء المفتاح
            el.addEventListener('change', (e) => {
                localStorage.setItem('yaqeen_' + id, e.target.checked);
                
                // إذا قام بتفعيل النقرة، نُسمعه الصوت للتأكيد
                if(e.target.checked && id === 'sound') {
                    const clickAudio = document.getElementById('audio-click');
                    if(clickAudio) { clickAudio.currentTime = 0; clickAudio.play().catch(()=>{}); }
                }
            });
        }
    });
});
</script>
<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
            .then(reg => console.log('تم تشغيل الأوفلاين بنجاح!'))
            .catch(err => console.log('خطأ في تشغيل الأوفلاين:', err));
        });
    }
</script>
</body>
</html>
