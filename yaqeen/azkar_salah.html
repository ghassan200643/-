<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <link rel="icon" href="logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>أذكار بعد الصلاة - اليقين</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { padding-bottom: 50px; background: linear-gradient(135deg, #a8caba 0%, #5d4157 100%); background-attachment: fixed; }
        .header { display: flex; align-items: center; justify-content: center; padding: 20px; position: relative; border-bottom: 1px solid rgba(255,255,255,0.2); }
        .back-btn { position: absolute; right: 20px; background: rgba(255,255,255,0.2); border: 1px solid #fff; color: #fff; width: 40px; height: 40px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.2rem; cursor: pointer; text-decoration: none; }
        .page-title { margin: 0; font-size: 1.5rem; color: #fff; font-weight: 900; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
        
        .adhkar-container { padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .dhikr-card { background: rgba(255, 255, 255, 0.92); border-radius: 20px; padding: 20px; position: relative; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 12px; transition: 0.3s; box-shadow: 0 10px 20px rgba(0,0,0,0.15); color: #333; border: 2px solid transparent; }
        .dhikr-card.hero-pop { transform: scale(0.96); background: #fdfbfb; border-color: #8b0000; }
        .dhikr-card.completed { opacity: 0.6; pointer-events: none; border-color: #2ecc71; background: #f0fdf4; }
        
        .dhikr-number { position: absolute; top: 15px; left: 15px; background: #8b0000; color: #fff; font-weight: bold; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2);}
        .dhikr-title { color: #8b0000; font-weight: 900; font-size: 1.1rem; width: 100%; text-align: right; margin-bottom: -5px; }
        .dhikr-text { font-size: 1.25rem; line-height: 1.8; text-align: center; font-weight: bold; margin-top: 5px; }
        .dhikr-source { font-size: 0.9rem; color: #666; text-align: center; }
        
        .counter-bubble { background: #8b0000; color: #fff; border-radius: 30px; padding: 8px 30px; font-size: 1.3rem; font-weight: 900; box-shadow: 0 4px 10px rgba(0,0,0,0.2); transition: 0.3s; margin-top: 5px; }
        .dhikr-card.completed .counter-bubble { background: #2ecc71; }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="back-btn">❯</a>
        <h1 class="page-title">مَا يُقَالُ بَعْدَ الصَّلَاةِ</h1>
    </div>

    <div class="adhkar-container" id="adhkar-list"></div>

    <script>
        // قاعدة بيانات أذكار الصلاة المفصلة
        const salahAdhkar = [
            { id: "s1", num: 1, title: "الاستغفار والدعاء", text: "أَسْتَغْفِرُ اللهَ (ثَلَاثاً)<br><br>اللَّهُمَّ أَنْتَ السَّلَامُ، وَمِنْكَ السَّلَامُ، تَبَارَكْتَ يَا ذَا الْجَلَالِ وَالْإِكْرَامِ.", source: "[رواه مسلم]", count: 1 },
            { id: "s2", num: 2, title: "التهليل", text: "لَا إِلَهَ إِلَّا اللهُ وَحْدَهُ لَا شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ، اللَّهُمَّ لَا مَانِعَ لِمَا أَعْطَيْتَ، وَلَا مُعْطِيَ لِمَا مَنَعْتَ، وَلَا يَنْفَعُ ذَا الْجَدِّ مِنْكَ الْجَدُّ.", source: "[رواه البخاري ومسلم]", count: 1 },
            { id: "s3", num: 3, title: "التسبيح", text: "سُبْحَانَ اللهِ", source: "[رواه مسلم]", count: 33 },
            { id: "s4", num: 4, title: "التحميد", text: "الْحَمْدُ للهِ", source: "[رواه مسلم]", count: 33 },
            { id: "s5", num: 5, title: "التكبير", text: "اللهُ أَكْبَرُ", source: "[رواه مسلم]", count: 33 },
            { id: "s6", num: 6, title: "ختام المائة", text: "لَا إِلَهَ إِلَّا اللهُ وَحْدَهُ لَا شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ.", source: "(من قالها غفرت خطاياه وإن كانت مثل زبد البحر) [رواه مسلم]", count: 1 },
            { id: "s7", num: 7, title: "آية الكرسي", text: "اللَّهُ لَا إِلَٰهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ ۚ لَا تَأْخُذُهُ سِنَةٌ وَلَا نَوْمٌ ۚ...", source: "(من قرأها لم يمنعه من دخول الجنة إلا الموت) [النسائي]", count: 1 },
            { id: "s8", num: 8, title: "سورة الإخلاص", text: "قُلْ هُوَ اللَّهُ أَحَدٌ...", source: "(مرة واحدة، وبعد صلاتي الفجر والمغرب 3 مرات)", count: 1 },
            { id: "s9", num: 9, title: "سورة الفلق", text: "قُلْ أَعُوذُ بِرَبِّ الْفَلَقِ...", source: "(مرة واحدة، وبعد صلاتي الفجر والمغرب 3 مرات)", count: 1 },
            { id: "s10", num: 10, title: "سورة الناس", text: "قُلْ أَعُوذُ بِرَبِّ النَّاسِ...", source: "(مرة واحدة، وبعد صلاتي الفجر والمغرب 3 مرات)", count: 1 },
            { id: "s11", num: 11, title: "خاص بصلاتي الفجر والمغرب", text: "لَا إِلَهَ إِلَّا اللهُ وَحْدَهُ لَا شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ يُحْيِي وَيُمِيتُ وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ.", source: "(تقال 10 مرات بعد صلاتي الفجر والمغرب) [الترمذي]", count: 10 },
            { id: "s12", num: 12, title: "الاستجارة من النار (الفجر والمغرب)", text: "اللَّهُمَّ أَجِرْنِي مِنَ النَّارِ.", source: "(تقال 7 مرات بعد الفجر والمغرب) [أبو داود]", count: 7 }
        ];

        let activeCounters = {};
        const container = document.getElementById('adhkar-list');

        salahAdhkar.forEach(dhikr => {
            activeCounters[dhikr.id] = dhikr.count;
            const card = document.createElement('div');
            card.className = 'dhikr-card';
            card.id = `card-${dhikr.id}`;
            card.onclick = () => handleDhikrClick(dhikr.id);

            card.innerHTML = `
                <div class="dhikr-number">${dhikr.num}</div>
                <div class="dhikr-title">${dhikr.title}</div>
                <div class="dhikr-text">${dhikr.text}</div>
                <div class="dhikr-source">${dhikr.source}</div>
                <div class="counter-bubble" id="counter-${dhikr.id}">${dhikr.count}</div>
            `;
            container.appendChild(card);
        });

        function handleDhikrClick(id) {
            if (activeCounters[id] > 0) {
                const card = document.getElementById(`card-${id}`);
                const counterElement = document.getElementById(`counter-${id}`);
                
                activeCounters[id]--;
                
                card.classList.remove('hero-pop');
                void card.offsetWidth; 
                card.classList.add('hero-pop');

                if (activeCounters[id] > 0) {
                    counterElement.innerText = activeCounters[id];
                } else {
                    counterElement.innerText = '✔️ تم';
                    setTimeout(() => {
                        card.classList.add('completed');
                        card.classList.remove('hero-pop');
                    }, 300);
                }
            }
        }
    </script>

    <script src="app.js"></script>
    <audio id="audio-click" src="./audio/click.mp3" preload="auto"></audio>
</body>
</html>
