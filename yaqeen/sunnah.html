<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <link rel="icon" href="logo.png">
    <link rel="manifest" href="manifest.json">
    <link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحدي السنن - اليقين</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@500;700;900&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Tajawal', sans-serif; margin: 0; padding: 0;
            /* خلفية تميل للبرتقالي الفخم */
            background: linear-gradient(135deg, #3a1c0d, #6b3400, #a85b00); 
            color: #fff; min-height: 100vh;
        }
        .container { max-width: 500px; margin: 0 auto; padding: 20px; padding-bottom: 100px; }
        
        /* الرأس وزر الرجوع الذي تم حله */
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; }
        .back-btn { background: rgba(255, 150, 0, 0.2); border: 1px solid #FFA500; color: #FFA500; width: 45px; height: 45px; border-radius: 14px; display: flex; justify-content: center; align-items: center; font-size: 1.2rem; cursor: pointer; text-decoration: none; transition: 0.3s;}
        .back-btn:active { background: #FFA500; color: #000; transform: scale(0.9); }
        .title { font-size: 1.6rem; color: #FFA500; font-weight: 900; margin: 0;}
        
        /* عداد الأيام المتتالية */
        .streak-box { text-align: center; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 15px; border: 1px solid rgba(255,165,0,0.3); margin-bottom: 20px; font-weight: bold; color: #FFD700; font-size: 1.1rem; }
        
        /* شريط التقدم */
        .progress-wrapper { background: rgba(0,0,0,0.4); border-radius: 20px; height: 15px; width: 100%; margin-bottom: 25px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); position: relative;}
        .progress-fill { background: linear-gradient(90deg, #FF4500, #FFD700); height: 100%; width: 0%; transition: width 0.5s ease; border-radius: 20px; }
        .progress-text { text-align: center; font-size: 0.9rem; margin-top: -20px; margin-bottom: 20px; color: #FFA500; font-weight: bold;}

        /* كروت السنن */
        .sunnah-card { background: rgba(0, 0, 0, 0.35); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 16px; padding: 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; transition: 0.3s; }
        .sunnah-card.done { background: rgba(255, 165, 0, 0.15); border-color: #FFA500; transform: scale(1.02); }
        .sunnah-info h3 { margin: 0 0 6px 0; font-size: 1.1rem; color: #fff; }
        .sunnah-info p { margin: 0; font-size: 0.85rem; color: #ccc; line-height: 1.4; }
        .sunnah-card.done h3 { color: #FFD700; }
        
        .check-btn { width: 32px; height: 32px; border-radius: 50%; border: 2px solid #FFA500; background: transparent; cursor: pointer; display: flex; justify-content: center; align-items: center; color: transparent; font-size: 1.2rem; transition: 0.3s; flex-shrink: 0; }
        .sunnah-card.done .check-btn { background: #FFA500; color: #000; box-shadow: 0 0 10px rgba(255,165,0,0.5); }

        /* رسالة التهنئة المخفية */
        .congrats-msg { display: none; text-align: center; background: rgba(255, 215, 0, 0.2); border: 2px dashed #FFD700; color: #FFD700; padding: 20px; border-radius: 15px; margin-top: 20px; font-size: 1.3rem; font-weight: 900; animation: popIn 0.5s ease; }
        .congrats-msg.show { display: block; }
        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1 class="title">⭐ تحدي السنن</h1>
        <a href="index.html" class="back-btn">❯</a>
    </div>

    <div class="streak-box">🔥 أيام الالتزام المتتالية: <span id="streak-count">0</span> يوم</div>

    <div class="progress-wrapper">
        <div class="progress-fill" id="progress-bar"></div>
    </div>
    <div class="progress-text" id="progress-text">0% المنجز</div>

    <div id="sunnah-list"></div>

    <div class="congrats-msg" id="congrats-msg">
        ✨ بارك الله بك يا بطل! ✨<br>أكملت أهم سنن اليوم بنجاح!
    </div>
</div>

<script>
    const sunnahs = [
        { id: 's1', title: 'ركعتا الفجر', desc: 'خير من الدنيا وما فيها' },
        { id: 's2', title: 'سنن الظهر', desc: '٤ ركعات قبلها و ٢ بعدها' },
        { id: 's3', title: 'سنة العصر', desc: '٤ ركعات قبلها (رحم الله امرأً...)' },
        { id: 's4', title: 'سنة المغرب', desc: 'ركعتان بعدها' },
        { id: 's5', title: 'سنة العشاء', desc: 'ركعتان بعدها' },
        { id: 's6', title: 'الوتر', desc: 'ركعة أو أكثر تختم بها صلاة الليل' },
        { id: 's7', title: 'صلاة الضحى', desc: 'صلاة الأوابين (من الشروق للظهر)' },
        { id: 's8', title: 'أذكار الصباح', desc: 'حصنك المنيع لبداية اليوم' },
        { id: 's9', title: 'أذكار المساء', desc: 'طمأنينة لقلبك في نهاية اليوم' },
        { id: 's10', title: 'سورة الملك', desc: 'المنجية من عذاب القبر قبل النوم' },
        { id: 's11', title: 'أذكار النوم', desc: 'والنوم على الشق الأيمن' },
        { id: 's12', title: 'السواك', desc: 'مطهرة للفم، مرضاة للرب' },
        { id: 's13', title: 'التيامن', desc: 'البدء باليمين في اللبس والانتعال' },
        { id: 's14', title: 'البسملة', desc: 'قول "بسم الله" عند كل عمل والطعام' },
        { id: 's15', title: 'دعاء الدخول/الخروج', desc: 'للمنزل وللخلاء' },
        { id: 's16', title: 'الترديد مع المؤذن', desc: 'ثم الدعاء بعد الأذان' },
        { id: 's17', title: 'تحية المسجد', desc: 'ركعتان قبل الجلوس في المسجد' },
        { id: 's18', title: 'نفض الفراش', desc: 'ثلاث مرات قبل النوم' },
        { id: 's19', title: 'إفشاء السلام', desc: 'والابتسامة في وجه أخيك صدقة' },
        { id: 's20', title: 'الصلاة على النبي', desc: 'الإكثار منها، وخاصة يوم الجمعة' }
    ];

    const listDiv = document.getElementById('sunnah-list');
    const progressBar = document.getElementById('progress-bar');
    const progressText = document.getElementById('progress-text');
    const congratsMsg = document.getElementById('congrats-msg');
    const streakCount = document.getElementById('streak-count');
    
    const today = new Date().toDateString();

    // نظام التصفير اليومي وحساب الـ Streak
    let currentStreak = parseInt(localStorage.getItem('sunnah_streak') || '0');
    let lastPlayed = localStorage.getItem('sunnah_date');

    if (lastPlayed !== today) {
        // إذا كان هناك يوم فائت بدون لعب، يتصفر الستريك
        let yesterday = new Date();
        yesterday.setDate(yesterday.getDate() - 1);
        if (lastPlayed !== yesterday.toDateString()) {
            currentStreak = 0;
            localStorage.setItem('sunnah_streak', '0');
        }
        // تصفير الخيارات لليوم الجديد
        sunnahs.forEach(s => localStorage.removeItem('s_' + s.id));
        localStorage.setItem('sunnah_date', today);
        localStorage.setItem('streak_added_today', 'false');
    }
    
    streakCount.textContent = currentStreak;

    function updateProgress() {
        let doneCount = 0;
        sunnahs.forEach(s => { if(localStorage.getItem('s_' + s.id) === 'true') doneCount++; });
        
        let percent = Math.round((doneCount / sunnahs.length) * 100);
        progressBar.style.width = percent + '%';
        progressText.textContent = `${percent}% المنجز (${doneCount}/${sunnahs.length})`;

        // عند إكمال الـ 100%
        if (percent === 100) {
            congratsMsg.classList.add('show');
            if (localStorage.getItem('streak_added_today') !== 'true') {
                currentStreak++;
                localStorage.setItem('sunnah_streak', currentStreak);
                streakCount.textContent = currentStreak;
                localStorage.setItem('streak_added_today', 'true');
            }
        } else {
            congratsMsg.classList.remove('show');
            if (localStorage.getItem('streak_added_today') === 'true') {
                currentStreak = Math.max(0, currentStreak - 1);
                localStorage.setItem('sunnah_streak', currentStreak);
                streakCount.textContent = currentStreak;
                localStorage.setItem('streak_added_today', 'false');
            }
        }
    }

    // رسم السنن
    sunnahs.forEach(sunnah => {
        const isDone = localStorage.getItem('s_' + sunnah.id) === 'true';
        const card = document.createElement('div');
        card.className = `sunnah-card ${isDone ? 'done' : ''}`;
        card.innerHTML = `
            <div class="sunnah-info"><h3>${sunnah.title}</h3><p>${sunnah.desc}</p></div>
            <div class="check-btn">✔</div>
        `;
        
        card.addEventListener('click', () => {
            const newState = !card.classList.contains('done');
            card.classList.toggle('done', newState);
            localStorage.setItem('s_' + sunnah.id, newState);
            if(newState && localStorage.getItem('yaqeen_sound') !== 'false') navigator.vibrate?.(40);
            updateProgress();
        });
        
        listDiv.appendChild(card);
    });

    updateProgress(); // تشغيل الحساب عند فتح الصفحة
</script>

<audio id="audio-click" src="./audio/click.mp3" preload="auto"></audio>
<audio id="audio-alert5" src="./audio/adhan.mp3" preload="auto"></audio>
<audio id="audio-adhan" src="./audio/adhan.mp3" preload="auto"></audio>
<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
            .then(reg => console.log('تم تشغيل الأوفلاين بنجاح!'))
            .catch(err => console.log('خطأ في تشغيل الأوفلاين:', err));
        });
    }
</script>
</body>
</html>
