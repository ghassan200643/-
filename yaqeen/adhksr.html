<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <link rel="icon" href="logo.png">
    <link rel="manifest" href="manifest.json">
    <link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الأذكار - سبحة إلكترونية</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@500;700;900&display=swap');

        :root {
            --primary: #8b0000;
            --glass-bg: rgba(255, 255, 255, 0.92);
            --text-dark: #333;
            --success: #2ecc71;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Tajawal', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            color: var(--text-dark);
            background: linear-gradient(135deg, #a8caba 0%, #5d4157 100%);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .snowflakes {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            animation: snow 20s linear infinite;
            opacity: 0.5;
        }
        @keyframes snow {
            0% { background-position: 0px 0px; }
            100% { background-position: 500px 1000px; }
        }

        /* الهيدر */
        .header {
            width: 100%;
            max-width: 520px;
            padding: 15px 15px 12px;
            box-sizing: border-box;
            text-align: center;
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(15px);
            z-index: 100;
            border-bottom: 2px solid var(--primary);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            margin-bottom: 12px;
        }

        .page-title {
            margin: 0;
            font-size: 1.6rem;
            color: var(--primary);
            font-weight: 900;
        }

        .back-btn {
            position: absolute;
            right: 0;
            background: none;
            border: 2px solid var(--primary);
            color: var(--primary);
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 50%;
            width: 38px; height: 38px;
            display: flex; align-items: center; justify-content: center;
            transition: 0.3s;
        }
        .back-btn:hover { background: var(--primary); color: #fff; }

        /* أزرار التبويب */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
            padding: 8px 10px;
            border-radius: 25px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 4px 10px rgba(139, 0, 0, 0.3);
        }

        /* شريط التقدم */
        .progress-bar-wrap {
            width: 100%;
            max-width: 520px;
            padding: 10px 15px 0;
            box-sizing: border-box;
            z-index: 10;
        }
        .progress-bar-bg {
            background: rgba(255,255,255,0.4);
            border-radius: 10px;
            height: 8px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            background: var(--primary);
            border-radius: 10px;
            transition: width 0.4s ease;
        }
        .progress-label {
            text-align: center;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.9);
            margin-top: 4px;
            font-weight: bold;
        }

        /* حاوية الأذكار */
        .adhkar-container {
            width: 100%;
            max-width: 520px;
            padding: 15px 15px 80px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 10;
        }

        /* بطاقة الذكر */
        .dhikr-card {
            background: var(--glass-bg);
            border: 2px solid #ddd;
            border-radius: 20px;
            padding: 20px 18px;
            position: relative;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            user-select: none;
        }

        .dhikr-number {
            position: absolute;
            top: 12px;
            left: 15px;
            background: var(--primary);
            color: #fff;
            font-size: 0.75rem;
            font-weight: bold;
            width: 26px; height: 26px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }

        .dhikr-title {
            color: var(--primary);
            font-weight: bold;
            font-size: 1rem;
            width: 100%;
            text-align: right;
            margin-bottom: -5px;
        }

        .dhikr-text {
            font-size: 1.2rem;
            line-height: 1.9;
            text-align: center;
            font-weight: 700;
            direction: rtl;
        }

        .dhikr-source {
            font-size: 0.78rem;
            color: #888;
            text-align: center;
            font-style: italic;
        }

        /* تأثير البطل */
        .hero-pop {
            animation: heroClick 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-color: var(--primary);
            box-shadow: 0 0 25px rgba(139, 0, 0, 0.35);
        }

        @keyframes heroClick {
            0% { transform: scale(1); }
            45% { transform: scale(0.93); background: rgba(139, 0, 0, 0.06); }
            100% { transform: scale(1); }
        }

        /* حالة الاكتمال */
        .dhikr-card.completed {
            opacity: 0.55;
            border-color: var(--success);
            transform: scale(0.98);
            pointer-events: none;
            box-shadow: none;
            background: #f0fdf4;
        }

        /* العداد */
        .counter-bubble {
            background: var(--primary);
            color: #fff;
            border-radius: 30px;
            padding: 8px 30px;
            font-size: 1.4rem;
            font-weight: 900;
            font-family: monospace;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            min-width: 80px;
            text-align: center;
        }

        .dhikr-card.completed .counter-bubble {
            background: var(--success);
            transform: scale(1.1);
            font-size: 1.2rem;
        }

        /* زر إعادة الضبط */
        .reset-btn {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 30px;
            padding: 12px 35px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            z-index: 200;
            box-shadow: 0 5px 20px rgba(139,0,0,0.4);
            transition: 0.3s;
        }
        .reset-btn:hover { transform: translateX(-50%) scale(1.05); }

        /* رسالة الاكتمال الكاملة */
        .all-done-msg {
            display: none;
            text-align: center;
            padding: 30px 20px;
            color: #fff;
        }
        .all-done-msg.show { display: block; }
        .all-done-msg h2 { font-size: 2rem; margin-bottom: 10px; }
        .all-done-msg p { font-size: 1.1rem; opacity: 0.9; }
    </style>
</head>

// ======================================================
// المنطق البرمجي
// ======================================================
let currentCategory = 'morning';
let activeCounters = {};

function updateProgress() {
    const cat = adhkarData[currentCategory];
    let total = cat.length;
    let done = cat.filter(d => activeCounters[d.id] === 0).length;
    let pct = total > 0 ? Math.round((done / total) * 100) : 0;
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('progress-label').innerText = `${done} / ${total} مكتمل`;
    
    const allDone = document.getElementById('all-done-msg');
    if (done === total && total > 0) {
        allDone.classList.add('show');
    } else {
        allDone.classList.remove('show');
    }
}

function loadAdhkar(category) {
    currentCategory = category;
    
    document.getElementById('tab-morning').classList.remove('active');
    document.getElementById('tab-evening').classList.remove('active');
    document.getElementById(`tab-${category}`).classList.add('active');

    const container = document.getElementById('adhkar-list');
    container.innerHTML = '';

    adhkarData[category].forEach(dhikr => {
        if (activeCounters[dhikr.id] === undefined) {
            activeCounters[dhikr.id] = dhikr.count;
        }

        const currentCount = activeCounters[dhikr.id];
        const isCompleted = currentCount === 0;

        const card = document.createElement('div');
        card.className = `dhikr-card ${isCompleted ? 'completed' : ''}`;
        card.id = `card-${dhikr.id}`;
        card.onclick = () => handleDhikrClick(dhikr.id);

        card.innerHTML = `
            <div class="dhikr-number">${dhikr.num}</div>
            <div class="dhikr-title">${dhikr.title}</div>
            <div class="dhikr-text">${dhikr.text.replace(/\n/g, '<br>')}</div>
            ${dhikr.source ? `<div class="dhikr-source">${dhikr.source}</div>` : ''}
            <div class="counter-bubble" id="counter-${dhikr.id}">
                ${isCompleted ? '✔️ تم' : currentCount}
            </div>
        `;
        
        container.appendChild(card);
    });
    
    updateProgress();
}

function handleDhikrClick(id) {
    if (activeCounters[id] > 0) {
        const card = document.getElementById(`card-${id}`);
        const counterElement = document.getElementById(`counter-${id}`);

        activeCounters[id]--;

        card.classList.remove('hero-pop');
        void card.offsetWidth;
        card.classList.add('hero-pop');

        if (activeCounters[id] > 0) {
            counterElement.innerText = activeCounters[id];
        } else {
            counterElement.innerText = '✔️ تم';
            setTimeout(() => {
                card.classList.add('completed');
                card.classList.remove('hero-pop');
                updateProgress();
            }, 300);
        }
        
        if (activeCounters[id] > 0) updateProgress();
    }
}

function resetAll() {
    adhkarData[currentCategory].forEach(d => {
        activeCounters[d.id] = d.count;
    });
    loadAdhkar(currentCategory);
}

// تشغيل أذكار الصباح افتراضياً
loadAdhkar('morning');
</script>
