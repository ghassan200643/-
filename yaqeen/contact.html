<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <link rel="icon" href="logo.png">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اتصل بنا - اليقين</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@500;700;900&display=swap');

        body {
            font-family: 'Tajawal', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            background-size: 400% 400%;
            animation: bgMove 15s ease infinite;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #fff;
            overflow-x: hidden;
        }

        @keyframes bgMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* شريط العنوان العلوي */
        .page-header {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(15, 32, 39, 0.8);
            backdrop-filter: blur(15px);
            border-bottom: 2px solid #FFD700;
            box-shadow: 0 5px 20px rgba(0,0,0,0.4);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .back-btn {
            position: absolute;
            right: 20px;
            background: rgba(255, 215, 0, 0.2);
            border: 1px solid #FFD700;
            color: #FFD700;
            width: 40px; height: 40px;
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .back-btn:hover { background: #FFD700; color: #000; transform: translateX(-5px); }

        .page-title { margin: 0; font-size: 1.5rem; color: #FFD700; font-weight: 900; }

        /* حاوية المحتوى */
        .contact-container {
            width: 100%;
            max-width: 450px;
            padding: 30px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* بطاقة المطور التعريفية */
        .developer-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            margin-bottom: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .dev-avatar {
            font-size: 3.5rem;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 10px rgba(255,215,0,0.5));
        }

        .dev-name { font-size: 1.4rem; font-weight: 900; color: #fff; margin-bottom: 5px; }
        .dev-desc { font-size: 0.95rem; color: #ccc; }

        /* بطاقات التواصل */
        .contact-card {
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 18px;
            padding: 15px 20px;
            text-decoration: none;
            color: #fff;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
        }

        .contact-card::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: 0.5s;
        }

        .contact-card:hover::before { left: 100%; }

        .contact-card:hover {
            transform: translateY(-5px);
            background: rgba(0, 0, 0, 0.6);
        }

        /* ألوان المنصات عند اللمس/التمرير */
        .contact-card.insta:hover { border-color: #E1306C; box-shadow: 0 5px 20px rgba(225, 48, 108, 0.4); }
        .contact-card.fb:hover { border-color: #1877F2; box-shadow: 0 5px 20px rgba(24, 119, 242, 0.4); }
        .contact-card.wa:hover { border-color: #25D366; box-shadow: 0 5px 20px rgba(37, 211, 102, 0.4); }
        .contact-card.email:hover { border-color: #EA4335; box-shadow: 0 5px 20px rgba(234, 67, 53, 0.4); }
        .contact-card.tiktok:hover { border-color: #00f2fe; box-shadow: 0 5px 20px rgba(0, 242, 254, 0.4); }

        .contact-icon {
            font-size: 2rem;
            margin-left: 15px; /* يسار لأن الاتجاه RTL */
            width: 50px; height: 50px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            display: flex; justify-content: center; align-items: center;
            transition: 0.3s;
        }

        .contact-card:hover .contact-icon {
            transform: scale(1.1) rotate(-5deg);
        }

        .contact-details {
            display: flex;
            flex-direction: column;
        }

        .platform-name { font-size: 1.1rem; font-weight: bold; margin-bottom: 3px; }
        .platform-handle { font-size: 0.85rem; color: #aaa; font-family: monospace; }

        /* تأثيرات الإضاءة للـ Icons الخاصة بكل منصة */
        .insta:hover .contact-icon { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        .fb:hover .contact-icon { background: #1877F2; }
        .wa:hover .contact-icon { background: #25D366; }
        .email:hover .contact-icon { background: #EA4335; }
        .tiktok:hover .contact-icon { background: linear-gradient(45deg, #00f2fe, #4facfe); color: #000; }

    </style>
</head>
